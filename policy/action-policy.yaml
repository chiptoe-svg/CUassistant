# Authorized-use list for host-side enforcement.
# The intent is to keep action boundaries explicit and reviewable. OAuth scopes
# describe what the delegated token may technically permit; this file describes
# what CUassistant is authorized to expose or execute.

policy_version: 1
policy_name: personal_m365_agentic_workflow
principal_scope:
  tenancy: delegated_user_only
  mailbox: self_only
  calendar: self_only
  tasks: self_only

approved_graph_scopes:
  - Mail.ReadWrite
  - Tasks.ReadWrite
  - Calendars.ReadWrite
  - offline_access

actions:
  - id: mail.list_inbox
    surface: mail
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_mailbox_only

  - id: mail.fetch_body
    surface: mail
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_mailbox_only

  - id: mail.get_attachment
    surface: mail
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_mailbox_only

  - id: mail.list_folders
    surface: mail
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_mailbox_only

  - id: mail.update_message
    surface: mail
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_mailbox_only
      - metadata_only
      - no_body_rewrite
      - no_send
      - no_delete

  - id: mail.move_message
    surface: mail
    risk: low
    reversibility: reversible
    approval: none
    # destination_subtree_allow_list: the destination path must sit under an
    # allowed prefix in MCP_ALLOWED_MAIL_DESTINATIONS (segment-aware) AND must
    # not be a system/destructive folder (trash/junk/deleted/recoverable). Fails
    # closed when no prefixes are configured.
    constraints:
      - own_mailbox_only
      - destination_subtree_allow_list

  - id: mail.create_draft
    surface: mail
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_mailbox_only
      - draft_only
      - no_send

  - id: calendar.list_events
    surface: calendar
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_primary_calendar_only

  - id: calendar.get_event
    surface: calendar
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_primary_calendar_only

  - id: calendar.get_view
    surface: calendar
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_primary_calendar_only

  - id: todo.create_task
    surface: tasks
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.list_lists
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.list_tasks
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.get_task
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.find_task_by_marker
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.update_task
    surface: tasks
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_task_list_only

  - id: host.get_scan_status
    surface: host_state
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - local_state_only

  - id: host.get_pending_actions
    surface: host_state
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - local_state_only

  - id: host.get_triage_candidates
    surface: host_scan
    risk: low_medium
    reversibility: creates_downstream_tasks_via_agent
    approval: none
    constraints:
      - local_state_only

  - id: host.log_triage_decision
    surface: host_state
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - local_state_only

  - id: host.complete_scan
    surface: host_scan
    risk: low_medium
    reversibility: creates_downstream_tasks_via_agent
    approval: none
    constraints:
      - local_state_only

  - id: calendar.create_personal_event
    surface: calendar
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_primary_calendar_only
      - no_attendees
      - no_invites
      - no_shared_or_delegated_calendar

  - id: calendar.update_personal_event
    surface: calendar
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_primary_calendar_only
      - no_attendees
      - no_invites
      - no_shared_or_delegated_calendar

  - id: host.trigger_scan
    surface: host_scan
    risk: medium
    reversibility: creates_downstream_tasks
    approval: human_required
    constraints:
      - disabled_by_default
      - dry_run_only_unless_explicitly_enabled

  - id: todo.delete_task
    surface: tasks
    risk: medium
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.send_message
    surface: mail
    risk: high
    reversibility: hard_to_reverse
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.delete_message
    surface: mail
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.permanent_delete_message
    surface: mail
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.invite_attendees
    surface: calendar
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.modify_shared_event
    surface: calendar
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.delete_event
    surface: calendar
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.respond_to_invite
    surface: calendar
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.send_with_approval
    surface: mail
    risk: high
    reversibility: irreversible
    approval:
      none # "none" = the agent may SUBMIT a request; the
      # human gate is enforced at runtime by the Telegram
      # approval, not by this static field.
    # NOTE: the runtime human-approval + frozen-artifact controls are enforced
    # in code (ApprovalGate), not as policy constraints.
    constraints:
      - own_mailbox_only

  # Public, no-auth third-party reads (Clemson Banner Browse Classes). Not
  # Microsoft Graph — no delegated token or consent involved. Read-only.
  - id: clemson.list_terms
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.search_classes
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.section_details
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.instructor_classes
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.room_availability
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.gc_catalog_years
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.gc_program_plan
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.gc_requirement_rules
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.gc_gen_ed
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.gc_course
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  # Deterministic degree audit on a sanitized gc-progress-v1 record.
  # Input is sanitized-by-construction: course codes + terms + credits only;
  # no grades, no student identity, no FERPA content. Runs on-host (execFile
  # to audit.py in gc_advisor), no external network call. Treated as external_read
  # because it consumes catalog data via the gc_advisor DB.
  - id: clemson.gc_audit_progress
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  # --- Google Sheets / Docs (gws — Clemson Google Workspace) ---
  # READ any file and APPEND to any file (additive). The one write that can
  # overwrite existing data — update-sheet-range (cell overwrite) — is restricted
  # to files this agent created (own_created_file_only, checked against
  # state/gws-created-files.json; npm run gws:grant adds a specific file).
  # Destructive edges (delete / share / overwrite-whole-doc) stay human_required
  # and not exposed (a later step can flip them to own-files-only).
  - id: sheets.read_values
    surface: sheets
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_workspace_only

  - id: sheets.read_metadata
    surface: sheets
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_workspace_only

  - id: sheets.create
    surface: sheets
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_workspace_only

  - id: sheets.update_values
    surface: sheets
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_created_file_only

  - id: sheets.append_values
    surface: sheets
    risk: low
    reversibility: reversible
    approval: none
    # Append is additive (INSERT_ROWS, never overwrites) -> allowed on any file.
    constraints:
      - own_workspace_only

  - id: docs.read
    surface: docs
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_workspace_only

  - id: docs.create
    surface: docs
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_workspace_only

  - id: docs.append_text
    surface: docs
    risk: low
    reversibility: reversible
    approval: none
    # Append adds text at the end (additive) -> allowed on any file.
    constraints:
      - own_workspace_only

  - id: sheets.delete_spreadsheet
    surface: sheets
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: sheets.share
    surface: sheets
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: docs.delete
    surface: docs
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: docs.share
    surface: docs
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: docs.overwrite_body
    surface: docs
    risk: medium
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

# LLM providers the email classifier may send mailbox content (subject + body)
# to. This is the IT-reviewable record of where mailbox data may go. The
# classifier refuses any provider not listed here with authorized: true
# (fail closed). Add as many providers as needed.
#   scope: external -> content leaves the M365 envelope; `basis` must cite the
#                      DPA / institutional agreement that covers it, and
#                      `authorized` attests (does not prove) that it applies.
#   scope: local    -> on-host inference (a local LLM); content does not leave
#                      the machine, so no data agreement is required.
data_egress:
  classifiers:
    - provider: codex_chatgpt_edu
      scope: external
      sends: [subject, body]
      basis: "ChatGPT Edu institutional agreement (Clemson)"
      authorized: true

    - provider: openai_api
      scope: external
      sends: [subject, body]
      basis: "OpenAI — covered under Clemson institutional contract"
      authorized: true

    # Local LLM backends — on-host inference, no egress. Declared and authorized
    # for when a local classifier backend is wired (e.g. OMLX, Ollama).
    - provider: local_omlx
      scope: local
      sends: [subject, body]
      basis: "on-host inference (OMLX); content does not leave the machine"
      authorized: true

    - provider: local_ollama
      scope: local
      sends: [subject, body]
      basis: "on-host inference (Ollama); content does not leave the machine"
      authorized: true

  # Model backends that a CONSUMING AGENT (a paired MCP client) may attest to.
  # An agent's per-agent token is minted only if its --provider is listed here
  # with authorized: true, and the server re-checks this on every request. This
  # is the IT-reviewable record of which AI providers Clemson data may reach via
  # an agent's own reasoning model (distinct from the classifier list above).
  agent_backends:
    - provider: chatgpt_edu
      scope: external
      basis: "ChatGPT Edu institutional agreement (Clemson)"
      authorized: true
    - provider: openai_api
      scope: external
      basis: "OpenAI — covered under Clemson institutional contract"
      authorized: true
    - provider: anthropic
      scope: external
      basis: "no Clemson agreement covering Anthropic"
      authorized: false
    # `local` is the agent --provider value for on-host inference; distinct
    # namespace from the classifier list's local_omlx / local_ollama above.
    - provider: local
      scope: local
      basis: "on-host inference; content does not leave the machine"
      authorized: true

audit_requirements:
  before_action:
    - timestamp
    - action_id
    - target_identifier
    - normalized_payload
    - policy_decision
  after_action:
    - timestamp
    - action_id
    - target_identifier
    - result_identifier
    - provider_response_status

enforcement_requirements:
  - host_enforced_allow_list
  - no_direct_model_graph_access
  - runtime_policy_check_per_action
  - append_only_decision_logging
  - append_only_usage_logging
