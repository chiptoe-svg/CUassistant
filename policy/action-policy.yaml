# Authorized-use list for host-side enforcement.
# The intent is to keep action boundaries explicit and reviewable. OAuth scopes
# describe what the delegated token may technically permit; this file describes
# what CUassistant is authorized to expose or execute.

policy_version: 1
policy_name: personal_m365_agentic_workflow
principal_scope:
  tenancy: delegated_user_only
  mailbox: self_only
  calendar: self_only
  tasks: self_only

approved_graph_scopes:
  - Mail.ReadWrite
  - Tasks.ReadWrite
  - Calendars.ReadWrite
  - offline_access

actions:
  - id: mail.list_inbox
    surface: mail
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_mailbox_only

  - id: mail.fetch_body
    surface: mail
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_mailbox_only

  - id: mail.update_message
    surface: mail
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_mailbox_only
      - metadata_only
      - no_body_rewrite
      - no_send
      - no_delete

  - id: mail.move_message
    surface: mail
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_mailbox_only
      - destination_folder_allow_list
      - no_delete_folder
      - no_junk_folder
      - no_recoverable_items
      - no_permanent_delete

  - id: mail.create_draft
    surface: mail
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_mailbox_only
      - draft_only
      - no_send

  - id: calendar.list_events
    surface: calendar
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_primary_calendar_only

  - id: calendar.get_event
    surface: calendar
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_primary_calendar_only

  - id: calendar.get_view
    surface: calendar
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_primary_calendar_only

  - id: todo.create_task
    surface: tasks
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.list_lists
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.list_tasks
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.get_task
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.find_task_by_marker
    surface: tasks
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - own_task_list_only

  - id: todo.update_task
    surface: tasks
    risk: low
    reversibility: reversible
    approval: none
    constraints:
      - own_task_list_only

  - id: host.get_scan_status
    surface: host_state
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - local_state_only

  - id: host.get_pending_actions
    surface: host_state
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - local_state_only

  - id: calendar.create_personal_event
    surface: calendar
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_primary_calendar_only
      - no_attendees
      - no_invites
      - no_shared_or_delegated_calendar

  - id: calendar.update_personal_event
    surface: calendar
    risk: low_medium
    reversibility: reversible
    approval: none
    constraints:
      - own_primary_calendar_only
      - no_attendees
      - no_invites
      - no_shared_or_delegated_calendar

  - id: host.trigger_scan
    surface: host_scan
    risk: medium
    reversibility: creates_downstream_tasks
    approval: human_required
    constraints:
      - disabled_by_default
      - dry_run_only_unless_explicitly_enabled

  - id: todo.delete_task
    surface: tasks
    risk: medium
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.send_message
    surface: mail
    risk: high
    reversibility: hard_to_reverse
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.delete_message
    surface: mail
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.permanent_delete_message
    surface: mail
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.invite_attendees
    surface: calendar
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.modify_shared_event
    surface: calendar
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.delete_event
    surface: calendar
    risk: high
    reversibility: destructive
    approval: human_required
    constraints:
      - disabled_by_default

  - id: calendar.respond_to_invite
    surface: calendar
    risk: high
    reversibility: affects_other_users
    approval: human_required
    constraints:
      - disabled_by_default

  - id: mail.send_with_approval
    surface: mail
    risk: high
    reversibility: irreversible
    approval: none          # "none" = the agent may SUBMIT a request; the
                            # human gate is enforced at runtime by the Telegram
                            # approval, not by this static field.
    # NOTE: the runtime human-approval + frozen-artifact controls are enforced
    # in code (ApprovalGate), not as policy constraints.
    constraints:
      - own_mailbox_only

  # Public, no-auth third-party reads (Clemson Banner Browse Classes). Not
  # Microsoft Graph — no delegated token or consent involved. Read-only.
  - id: clemson.list_terms
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

  - id: clemson.search_classes
    surface: external_read
    risk: low
    reversibility: read_only
    approval: none
    constraints:
      - public_data_only

audit_requirements:
  before_action:
    - timestamp
    - action_id
    - target_identifier
    - normalized_payload
    - policy_decision
  after_action:
    - timestamp
    - action_id
    - target_identifier
    - result_identifier
    - provider_response_status

enforcement_requirements:
  - host_enforced_allow_list
  - no_direct_model_graph_access
  - runtime_policy_check_per_action
  - append_only_decision_logging
  - append_only_usage_logging
